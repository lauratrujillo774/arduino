<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/frontend/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <title>Iniciar Sesion</title>
</head>
<body>
<!--navbar-->
<section id="nav">
    <nav class="navbar navbar-expand-lg " >
        <div class="container-fluid">
            <img src="/frontend/img/HIDROTEC (1).png" alt="" height="200px" width="215px">
          <a class="navbar-brand" href="#" style="font-size: 30px; font-family: roboto;"><b>HidroTec</b></a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          </div>
        </div>
      </nav>
    </section>
    
      <h1 class="texto">Iniciar sesión</h1>

    <!---->
    <section id="ingreso">
    <form id="loginForm">
        <div class="form-row">
          <div class="form-group col-md-6">
            <label for="inputEmail4"><b>Email*</b></label>
            <input type="email" class="form-control" id="inputEmail4" name="email" placeholder="Email" style="margin-bottom: 20px;" required>
          </div>
          <div class="form-group col-md-6">
            <label for="inputPassword4"><b>Contraseña*</b></label>
            <input type="password" class="form-control" id="inputPassword4" name="password" placeholder="Contraseña" style="margin-bottom: 9px;" required>
          </div>
          <div>
            <ul class="lista"><a href="" >¿Olvidaste la contraseña?</a></ul>
          </div>
        </div>
        
        <!-- Mensaje de error -->
        <div id="errorMessage" class="alert alert-danger" style="display: none; margin-bottom: 15px;"></div>
        
        <!-- Spinner de carga -->
        <div id="loadingSpinner" class="text-center" style="display: none; margin-bottom: 15px;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
        
        <button type="submit" id="loginBtn">Iniciar Sesión</button>
    </form>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const loginData = {
                email: formData.get('email'),
                password: formData.get('password')
            };
            
            // Mostrar spinner y ocultar mensajes de error
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('loginBtn').disabled = true;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Guardar datos del usuario en localStorage
                    localStorage.setItem('user', JSON.stringify(result.user));
                    localStorage.setItem('userType', result.userType);
                    
                    // Mostrar mensaje de éxito
                    alert(`¡Bienvenido ${result.user.nombre}!`);
                    
                    // Redirigir según el tipo de usuario
                    window.location.href = result.redirect;
                } else {
                    // Mostrar mensaje de error
                    document.getElementById('errorMessage').textContent = result.message;
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('errorMessage').textContent = 'Error de conexión. Inténtalo nuevamente.';
                document.getElementById('errorMessage').style.display = 'block';
            } finally {
                // Ocultar spinner y habilitar botón
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('loginBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
